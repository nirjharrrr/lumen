<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#161617; --side:#121213; --card:#202022; --card-2:#1A1A1C;
      --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.14);
      --fg:#ECEAE6; --muted:#8C867E; --faint:#615C56; --accent:#F26A2E; --accent-soft:rgba(242,106,46,.16);
      --prog:#7C6BF2; --good:#3FCB6B; --good-soft:rgba(40,200,90,.13);
      --side-w:212px; --queue-w:300px;
    }
    [data-theme="light"]{
      --bg:#F4F1EC; --side:#FBF9F5; --card:#FFFFFF; --card-2:#FBFAF8;
      --line:rgba(20,18,12,.09); --line-2:rgba(20,18,12,.16);
      --fg:#15140F; --muted:#6F6A62; --faint:#9A938A; --accent:#F26A2E; --accent-soft:rgba(242,106,46,.1);
      --prog:#6C5CE7; --good:#16A34A; --good-soft:rgba(22,163,74,.1);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-0.011em}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    ::selection{background:var(--accent-soft)}
    ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px;border:3px solid transparent;background-clip:content-box}
    .app{display:grid;grid-template-columns:var(--side-w) 1fr var(--queue-w);height:100vh;overflow:hidden}
    .logo-img{height:24px;display:block;margin:6px 10px 18px;filter:invert(1)}
    [data-theme="light"] .logo-img{filter:none}
    .logo-text{font-weight:800;font-size:1.22rem;letter-spacing:-0.05em;margin:2px 10px 16px;display:block}

    /* sidebar */
    .side{background:var(--side);border-right:1px solid var(--line);padding:18px 11px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
    .nav{display:flex;align-items:center;gap:11px;padding:8px 11px;border-radius:8px;color:var(--muted);font-size:0.85rem;font-weight:500;transition:.12s}
    .nav svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7;flex-shrink:0}
    .nav:hover{background:var(--line);color:var(--fg)}
    .nav.active{background:var(--line);color:var(--fg);font-weight:600}
    .nav .ct{margin-left:auto;font-size:0.72rem;color:var(--faint)}
    .nlabel{font-size:0.66rem;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);padding:16px 11px 7px}
    .spacer{flex:1}

    /* main */
    .main{overflow-y:auto;padding:24px 28px}
    .top{display:flex;align-items:center;margin-bottom:3px}
    .top h1{font-size:1.4rem;font-weight:700}
    .top .icons{margin-left:auto;display:flex;gap:6px;align-items:center}
    .ibtn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--muted);position:relative}
    .ibtn:hover{background:var(--line);color:var(--fg)}
    .ibtn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7}
    .ibtn .dot{position:absolute;top:7px;right:8px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
    .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#F26A2E,#B23);margin-left:6px;flex-shrink:0}
    .subtitle{color:var(--muted);font-size:0.86rem;margin-bottom:18px}

    /* universal input */
    .uinput-wrap{display:flex;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 8px 8px 16px;margin-bottom:8px;transition:border-color .15s}
    .uinput-wrap:focus-within{border-color:var(--accent)}
    .uinput-wrap . chain{}
    .uinput-wrap input{flex:1;border:none;outline:none;background:none;font-family:inherit;font-size:0.92rem;color:var(--fg);padding:8px 10px}
    .uinput-wrap input::placeholder{color:var(--faint)}
    .btn-ghost{display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--muted);border:1px solid var(--line-2);padding:8px 13px;border-radius:9px;margin-right:8px;font-weight:500}
    .btn-ghost:hover{color:var(--fg);border-color:var(--fg)}
    .btn-go{font-size:0.84rem;font-weight:600;background:var(--fg);color:var(--bg);padding:8px 18px;border-radius:9px}
    .btn-go:hover{opacity:.9}

    /* analysis result */
    #result:not(:empty){margin:10px 0 4px}
    .result-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;gap:14px;align-items:flex-start;animation:rise .3s ease}
    @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .r-thumb{width:120px;height:72px;border-radius:9px;object-fit:cover;background:var(--card-2);flex-shrink:0;display:grid;place-items:center;color:var(--faint)}
    .r-kind{font-size:0.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);font-weight:700}
    .r-title{font-weight:600;font-size:0.95rem;margin:3px 0 1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .r-meta{font-size:0.78rem;color:var(--muted)}
    .row{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:12px}
    .seg{display:inline-flex;background:var(--card-2);border:1px solid var(--line);border-radius:9px;overflow:hidden}
    .seg button{padding:6px 12px;font-size:0.74rem;color:var(--muted);font-weight:600}
    .seg button.active{background:var(--fg);color:var(--bg)}
    .chip{padding:5px 10px;border:1px solid var(--line);border-radius:7px;font-size:0.72rem;color:var(--muted);font-weight:600;background:var(--card-2)}
    .chip.active{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
    .btn-primary{padding:8px 18px;background:var(--accent);color:#fff;border-radius:9px;font-weight:600;font-size:0.8rem;margin-left:auto}
    .btn-primary:hover{filter:brightness(1.06)}

    /* sections */
    .sec{margin-top:26px}
    .sec-h{display:flex;align-items:center;margin-bottom:12px}
    .sec-h h2{font-size:0.84rem;font-weight:600}
    .sec-h .va{margin-left:auto;font-size:0.68rem;color:var(--muted);background:var(--line);padding:5px 11px;border-radius:20px}
    .sec-h .va:hover{color:var(--fg)}

    /* quick actions */
    .qa{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
    .qa-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px;text-align:left;transition:transform .12s,border-color .12s}
    .qa-card:hover{transform:translateY(-2px);border-color:var(--line-2)}
    .qa-ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;margin-bottom:10px}
    .qa-ic svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:1.8}
    .qa-card .t{font-size:0.82rem;font-weight:600}
    .qa-card .d{font-size:0.69rem;color:var(--faint);margin-top:2px}

    /* table */
    .tbl{width:100%;border-collapse:collapse}
    .tbl th{text-align:left;font-size:0.67rem;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:600;padding:0 10px 11px}
    .tbl td{padding:10px;border-top:1px solid var(--line);font-size:0.8rem;color:var(--muted);vertical-align:middle}
    .tbl tr.clk{cursor:pointer}
    .tbl tr.clk:hover td{background:var(--card-2)}
    .rn{display:flex;align-items:center;gap:11px}
    .rn-thumb{width:38px;height:26px;border-radius:6px;background:var(--card-2);object-fit:cover;flex-shrink:0}
    .rn .nm{font-weight:600;color:var(--fg);font-size:0.8rem;max-width:230px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rn .sb{font-size:0.66rem;color:var(--faint)}
    .done{display:inline-flex;align-items:center;gap:5px;background:var(--good-soft);color:var(--good);font-size:0.7rem;font-weight:600;padding:3px 9px;border-radius:20px}

    /* queue */
    .queue{background:var(--side);border-left:1px solid var(--line);padding:20px 16px;overflow-y:auto}
    .q-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
    .q-thumb{width:34px;height:34px;border-radius:7px;flex-shrink:0;background:linear-gradient(135deg,#444,#222);object-fit:cover}
    .q-item .nm{font-size:0.78rem;font-weight:600;color:var(--fg);max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .q-item .sb{font-size:0.66rem;color:var(--faint)}
    .q-pct{margin-left:auto;font-size:0.72rem;color:var(--muted);font-variant-numeric:tabular-nums}
    .q-bar{height:4px;background:var(--line);border-radius:4px;margin-top:6px;overflow:hidden}
    .q-bar i{display:block;height:100%;background:var(--prog);border-radius:4px;transition:width .4s ease}
    .q-bar.ind i{width:35%!important;animation:sl 1.2s ease-in-out infinite}
    @keyframes sl{0%{margin-left:-35%}100%{margin-left:100%}}
    .q-err{color:#E5484D;font-size:0.7rem;margin-top:4px}
    .q-foot{display:flex;align-items:center;margin-top:14px;font-size:0.72rem;color:var(--faint)}
    .q-foot .vab{margin-left:auto;background:var(--line);color:var(--muted);padding:5px 12px;border-radius:8px}
    .q-empty{color:var(--faint);font-size:0.78rem;text-align:center;padding:30px 0}

    /* grid (downloads/library views) */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:13px}
    .tile{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .12s,border-color .12s}
    .tile:hover{transform:translateY(-2px);border-color:var(--line-2)}
    .tile-th{aspect-ratio:16/10;background:var(--card-2);display:grid;place-items:center;color:var(--faint);position:relative}
    .tile-th img{width:100%;height:100%;object-fit:cover}
    .tile-badge{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.6);color:#fff;font-size:0.6rem;font-weight:700;letter-spacing:.04em;padding:2px 6px;border-radius:5px;text-transform:uppercase}
    .tile-b{padding:9px 11px 11px}
    .tile-t{font-weight:600;font-size:0.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tile-m{font-size:0.68rem;color:var(--faint);margin-top:2px}

    /* empty */
    .empty{text-align:center;padding:64px 20px;color:var(--muted)}
    .empty svg{width:54px;height:54px;stroke:var(--line-2);fill:none;stroke-width:1.2;margin-bottom:16px}
    .empty h3{font-size:1.1rem;font-weight:700;color:var(--fg);margin-bottom:7px}
    .empty p{font-size:0.85rem;line-height:1.55}

    /* settings */
    .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:14px}
    .opt{display:flex;align-items:center;padding:15px 17px;border-bottom:1px solid var(--line)}
    .opt:last-child{border:none}
    .opt-l{font-weight:500}.opt-d{font-size:0.76rem;color:var(--faint);margin-top:1px}
    .opt .ctl{margin-left:auto}
    .toggle{width:42px;height:24px;border-radius:14px;background:var(--line-2);position:relative;transition:.18s}
    .toggle.on{background:var(--accent)}
    .toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .18s}
    .toggle.on::after{transform:translateX(18px)}

    /* inspector */
    .inspector{position:fixed;top:0;right:0;height:100vh;width:380px;background:var(--card);border-left:1px solid var(--line);box-shadow:-20px 0 50px rgba(0,0,0,.3);padding:22px;transform:translateX(100%);transition:transform .3s cubic-bezier(.3,.8,.2,1);overflow-y:auto;z-index:40}
    .inspector.open{transform:none}
    .ih{display:flex;align-items:center;margin-bottom:16px}
    .ih h3{font-size:0.8rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
    .iclose{margin-left:auto;width:28px;height:28px;border-radius:8px;display:grid;place-items:center;color:var(--muted)}
    .iclose:hover{background:var(--line)}
    .iprev{width:100%;aspect-ratio:16/10;border-radius:11px;object-fit:cover;background:var(--card-2);display:grid;place-items:center;color:var(--faint);margin-bottom:14px}
    .ititle{font-weight:700;font-size:1.02rem;margin-bottom:14px;word-break:break-word}
    .mr{display:flex;padding:9px 0;border-bottom:1px solid var(--line);font-size:0.82rem}
    .mr .k{color:var(--faint);width:108px;flex-shrink:0}.mr .v{color:var(--fg);word-break:break-word}
    .mr .v a{color:var(--accent);text-decoration:none}
    .iact{display:flex;gap:8px;margin:16px 0}
    .iact a,.iact button{flex:1;text-align:center;padding:9px;border-radius:9px;font-weight:600;font-size:0.8rem;text-decoration:none}
    .a-save{background:var(--accent);color:#fff}.a-del{background:var(--card-2);border:1px solid var(--line);color:#E5484D}
    .col-sel{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--card-2);color:var(--fg);font-family:inherit;font-size:0.82rem;margin-top:6px}
    .ai .lbl{font-size:0.72rem;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
    .soon{font-size:0.58rem;background:var(--accent-soft);color:var(--accent);padding:2px 7px;border-radius:20px;font-weight:800;letter-spacing:.04em}
    .ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .ai-act{padding:10px;border:1px solid var(--line);border-radius:9px;background:var(--card-2);font-size:0.76rem;color:var(--muted);text-align:left;cursor:not-allowed}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--fg);color:var(--bg);padding:10px 18px;border-radius:10px;font-size:0.84rem;font-weight:600;z-index:60;transition:.25s;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%)}
    @media(max-width:1000px){.app{grid-template-columns:var(--side-w) 1fr}.queue{display:none}.qa{grid-template-columns:1fr 1fr}}
    @media(max-width:720px){.app{grid-template-columns:1fr}.side{display:none}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <img class="logo-img" src="/static/lumen-logo.png" alt="lumen" onerror="this.outerHTML='<span class=&quot;logo-text&quot;>lumen</span>'">
      <button class="nav active" data-v="dashboard" onclick="go('dashboard')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>Dashboard</button>
      <button class="nav" data-v="downloads" onclick="go('downloads')"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5M12 15V3"/></svg>Downloads<span class="ct" id="ct-dl"></span></button>
      <button class="nav" data-v="history" onclick="go('history')"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>History</button>
      <button class="nav" data-v="queues" onclick="go('queues')"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h12"/></svg>Queues<span class="ct" id="ct-q"></span></button>
      <button class="nav" data-v="scheduled" onclick="go('scheduled')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Scheduled</button>
      <div class="nlabel">Library</div>
      <button class="nav" data-f="video" onclick="filt('video')"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="14" height="12" rx="2"/><path d="m22 8-6 4 6 4V8z"/></svg>Video</button>
      <button class="nav" data-f="audio" onclick="filt('audio')"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>Audio</button>
      <button class="nav" data-f="images" onclick="filt('images')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg>Image</button>
      <button class="nav" data-f="bundle" onclick="filt('bundle')"><svg viewBox="0 0 24 24"><path d="M21 15V6a2 2 0 0 0-2-2H9M3 9v9a2 2 0 0 0 2 2h10"/><circle cx="17" cy="16" r="2"/></svg>Playlist</button>
      <button class="nav" data-f="subtitle" onclick="filt('subtitle')"><svg viewBox="0 0 24 24"><path d="M4 5h16M4 12h16M4 19h10"/></svg>Subtitle</button>
      <button class="nav" data-f="document" onclick="filt('document')"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>Document</button>
      <div class="spacer"></div>
      <button class="nav" data-v="settings" onclick="go('settings')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</button>
    </aside>

    <main class="main">
      <div class="top">
        <h1 id="title">Dashboard</h1>
        <div class="icons">
          <button class="ibtn" onclick="toggleTheme()" title="Theme"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></svg></button>
          <button class="ibtn" title="Notifications"><svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="dot"></span></button>
          <div class="avatar"></div>
        </div>
      </div>
      <div class="subtitle" id="subtitle">Download from anywhere, in any format.</div>

      <div class="uinput-wrap">
        <input id="uinput" placeholder="Paste one or more URLs..." autocomplete="off" spellcheck="false">
        <button class="btn-ghost" onclick="pasteClip()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>Paste</button>
        <button class="btn-go" onclick="analyze()">Download</button>
      </div>
      <div id="result"></div>
      <div id="views"></div>
    </main>

    <aside class="queue" id="queue"></aside>
  </div>

  <aside class="inspector" id="inspector"></aside>
  <div class="toast" id="toast"></div>

  <script>
    const FMT_LABELS={video:'Video',audio:'Audio',all:'Everything · ZIP'};
    const QA=[
      {f:'video',t:'Download Video',d:'MP4, MOV, WEBM',c:'#6C5CE7',ic:'<rect x="2" y="6" width="14" height="12" rx="2"/><path d="m22 8-6 4 6 4V8z"/>'},
      {f:'audio',t:'Download Audio',d:'MP3, M4A, WAV...',c:'#16A34A',ic:'<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>'},
      {f:'all',t:'Download Playlist',d:'YouTube, SoundCloud...',c:'#EA8C2E',ic:'<path d="M21 15V6a2 2 0 0 0-2-2H9M3 9v9a2 2 0 0 0 2 2h10"/><circle cx="17" cy="16" r="2"/>'},
      {f:'all',t:'Download Image',d:'JPG, PNG, GIF, WEBP',c:'#2E7DEA',ic:'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/>'},
    ];
    let state={view:'dashboard',filter:null,analysis:null,selFormat:'video',selQuality:null,active:{},history:[],collections:[]};
    const $=s=>document.querySelector(s);
    const esc=s=>{const d=document.createElement('div');d.textContent=s??'';return d.innerHTML;};
    const api=(u,o)=>fetch(u,o).then(r=>r.json());
    function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
    function fmtBytes(b){if(!b)return '';const u=['B','KB','MB','GB'];let i=0;while(b>=1024&&i<3){b/=1024;i++;}return b.toFixed(b<10&&i>0?1:0)+' '+u[i];}
    function timeAgo(iso){const s=(Date.now()-new Date(iso).getTime())/1000;if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
    function kindLabel(t){return {video:'Video',audio:'Audio',images:'Images',bundle:'Playlist'}[t]||t;}

    function pasteClip(){ navigator.clipboard.readText().then(t=>{ if(t){ $('#uinput').value=t.trim(); analyze(); } }).catch(()=>toast('Clipboard blocked — paste manually')); }
    document.addEventListener('keydown',e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='n'){e.preventDefault();$('#uinput').focus();} if(e.key==='Escape')closeInspector(); });
    $('#uinput').addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();analyze();} });

    function toggleTheme(){const r=document.documentElement;r.dataset.theme=r.dataset.theme==='dark'?'light':'dark';localStorage.setItem('lumen-theme',r.dataset.theme);}

    // nav
    function go(v){state.view=v;state.filter=null;setNav();render();}
    function filt(f){state.view='downloads';state.filter=f;setNav();render();}
    function setNav(){
      document.querySelectorAll('.nav').forEach(n=>n.classList.remove('active'));
      if(state.filter)document.querySelector(`[data-f="${state.filter}"]`)?.classList.add('active');
      else document.querySelector(`[data-v="${state.view}"]`)?.classList.add('active');
      const titles={dashboard:'Dashboard',downloads:'Downloads',history:'History',queues:'Queues',scheduled:'Scheduled',settings:'Settings'};
      $('#title').textContent=state.filter?kindLabel(state.filter)+' Library':(titles[state.view]||'Dashboard');
    }

    // analyze + download
    async function analyze(){
      const url=$('#uinput').value.trim();if(!url)return;
      state.selFormat='video';state.selQuality=null;
      $('#result').innerHTML=`<div class="result-card"><div class="r-thumb">⋯</div><div style="flex:1"><div class="r-kind">Analyzing…</div><div class="r-title">${esc(url)}</div><div class="r-meta">Reading metadata</div></div></div>`;
      try{
        const d=await api('/api/info',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
        if(d.error){$('#result').innerHTML=`<div class="result-card"><div class="r-thumb">!</div><div style="flex:1"><div class="r-kind" style="color:#E5484D">Couldn't analyze</div><div class="r-meta">${esc(d.error)}</div></div></div>`;return;}
        d.url=url;state.analysis=d;state.selQuality=d.formats?.[0]?.id||null;renderResult();
      }catch(e){$('#result').innerHTML=`<div class="result-card"><div style="flex:1"><div class="r-meta">${esc(e.message)}</div></div></div>`;}
    }
    function fmtDur(s){const m=Math.floor(s/60),x=Math.floor(s%60);return m+':'+String(x).padStart(2,'0');}
    function pickF(f){state.selFormat=f;renderResult();}
    function pickQ(id){state.selQuality=id;renderResult();}
    function renderResult(){
      const d=state.analysis;if(!d)return;
      const isV=state.selFormat==='video',gallery=d.count>1;
      const thumb=d.thumbnail?`<img class="r-thumb" src="${esc(d.thumbnail)}">`:`<div class="r-thumb">▣</div>`;
      const quality=(isV&&d.formats?.length)?d.formats.map(f=>`<button class="chip ${f.id===state.selQuality?'active':''}" onclick="pickQ('${f.id}')">${esc(f.label)}</button>`).join(''):'';
      const meta=[d.uploader,gallery?`${d.count} items`:'',d.duration?fmtDur(d.duration):''].filter(Boolean).join(' · ');
      $('#result').innerHTML=`<div class="result-card">${thumb}<div style="flex:1;min-width:0">
        <div class="r-kind">${gallery?'Gallery':'Media'} · ${esc(new URL(d.url).hostname.replace('www.',''))}</div>
        <div class="r-title">${esc(d.title||'Untitled')}</div><div class="r-meta">${esc(meta||'Ready to download')}</div>
        <div class="row"><div class="seg">
          <button class="${state.selFormat==='video'?'active':''}" onclick="pickF('video')">MP4</button>
          <button class="${state.selFormat==='audio'?'active':''}" onclick="pickF('audio')">MP3</button>
          <button class="${state.selFormat==='all'?'active':''}" onclick="pickF('all')">ALL · ZIP</button>
        </div>${quality}<button class="btn-primary" onclick="startDownload()">Download${gallery&&state.selFormat==='all'?' '+d.count:''}</button></div>
      </div></div>`;
    }
    async function startDownload(){
      const d=state.analysis;if(!d)return;
      const body={url:d.url,format:state.selFormat,format_id:state.selQuality,title:d.title||'',thumbnail:d.thumbnail||'',resolution:(state.selFormat==='video'&&d.formats?.find(f=>f.id===state.selQuality)?.label)||''};
      const res=await api('/api/download',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(res.error){toast(res.error);return;}
      state.active[res.job_id]={id:res.job_id,title:d.title||'Download',source:new URL(d.url).hostname.replace('www.',''),format:state.selFormat,thumbnail:d.thumbnail,progress:0,status:'downloading'};
      $('#result').innerHTML='';$('#uinput').value='';renderQueue();pollJob(res.job_id);
    }
    function pollJob(id){
      const iv=setInterval(async()=>{
        let s;try{s=await api('/api/status/'+id);}catch{return;}
        const a=state.active[id];if(!a){clearInterval(iv);return;}
        a.progress=s.progress||a.progress;a.status=s.status;a.error=s.error;a.filename=s.filename;
        if(s.status==='done'){clearInterval(iv);a.progress=100;renderQueue();
          const link=document.createElement('a');link.href='/api/file/'+id;link.download=s.filename||'';link.click();
          delete state.active[id];await loadData();toast('Saved · '+(s.filename||'file'));render();
        }else if(s.status==='error'){clearInterval(iv);a.status='error';a.error=s.error;renderQueue();}
        else renderQueue();
      },700);
    }

    async function loadData(){
      const [h,c]=await Promise.all([api('/api/history'),api('/api/collections')]);
      state.history=h.items||[];state.collections=c.items||[];
      $('#ct-dl').textContent=state.history.length||'';
      $('#ct-q').textContent=Object.keys(state.active).length||'';
    }

    // ---- queue panel ----
    function renderQueue(){
      const items=Object.values(state.active);
      $('#ct-q').textContent=items.length||'';
      const active=items.filter(a=>a.status!=='error').length;
      let body;
      if(!items.length){ body=`<div class="q-empty">Queue is empty.<br>Paste a link to start.</div>`; }
      else body=items.map(a=>{
        const ind=a.progress<=0||a.format==='all';
        return `<div class="q-item"><div class="q-thumb" ${a.thumbnail?`style="background-image:url('${esc(a.thumbnail)}');background-size:cover"`:''}></div>
          <div style="flex:1;min-width:0"><div class="nm">${esc(a.title)}</div><div class="sb">${esc(a.source||'')}</div>
          ${a.status==='error'?`<div class="q-err">${esc(a.error||'Failed')}</div>`:`<div class="q-bar ${ind?'ind':''}"><i style="width:${a.progress||0}%"></i></div>`}</div>
          ${a.status==='error'?'':`<span class="q-pct">${a.progress?Math.round(a.progress)+'%':'…'}</span>`}</div>`;
      }).join('');
      $('#queue').innerHTML=`<div class="sec-h"><h2>Download Queue</h2><span class="va" onclick="go('queues')">›</span></div>${body}
        <div class="q-foot"><span>${active} Active</span><span class="vab" onclick="go('queues')">View All</span></div>`;
    }

    // ---- helpers ----
    function srcCell(e){ return `<span>${esc(e.source||'—')}</span>`; }
    function statusCell(){ return `<span class="done">Completed ✓</span>`; }
    function rowThumb(e){ return e.thumbnail?`<img class="rn-thumb" src="${esc(e.thumbnail)}">`:`<div class="rn-thumb"></div>`; }
    function tableRows(items){
      return items.map(e=>`<tr class="clk" onclick="openInspector('${e.id}')">
        <td><div class="rn">${rowThumb(e)}<div style="min-width:0"><div class="nm">${esc(e.title)}</div><div class="sb">${esc(e.source)} · ${timeAgo(e.date)}</div></div></div></td>
        <td>${srcCell(e)}</td><td>${esc(e.format)}</td><td>${esc(e.resolution)||'—'}</td><td>${fmtBytes(e.size)||'—'}</td><td>${statusCell()}</td>
      </tr>`).join('');
    }
    function tile(e){const thumb=e.thumbnail?`<img src="${esc(e.thumbnail)}">`:'▣';
      return `<div class="tile" onclick="openInspector('${e.id}')"><div class="tile-th"><span class="tile-badge">${esc(e.format||kindLabel(e.type))}</span>${thumb}</div>
        <div class="tile-b"><div class="tile-t">${esc(e.title)}</div><div class="tile-m">${[esc(e.source),fmtBytes(e.size)].filter(Boolean).join(' · ')}</div></div></div>`;}
    function emptyState(t,s){return `<div class="empty"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5M12 15V3"/></svg><h3>${t}</h3><p>${s}</p></div>`;}

    // ---- views ----
    function render(){
      $('#subtitle').textContent={dashboard:'Download from anywhere, in any format.',downloads:'Your media library.',history:'Everything you have downloaded.',queues:'Active and queued downloads.',scheduled:'Recurring & scheduled downloads.',settings:'Manage Lumen.'}[state.view]||'Your media library.';
      const v=$('#views');
      if(state.view==='dashboard')v.innerHTML=viewDashboard();
      else if(state.view==='downloads')v.innerHTML=viewDownloads();
      else if(state.view==='history')v.innerHTML=viewHistory();
      else if(state.view==='queues')v.innerHTML=viewQueues();
      else if(state.view==='scheduled')v.innerHTML=emptyState('No scheduled downloads.','Recurring downloads and watch-folders are coming soon.');
      else if(state.view==='settings')v.innerHTML=viewSettings();
      renderQueue();
    }
    function viewDashboard(){
      const qa=`<div class="sec"><div class="sec-h"><h2>Quick Actions</h2><span class="va" onclick="go('downloads')">View All</span></div><div class="qa">${QA.map(q=>`<button class="qa-card" onclick="quick('${q.f}')"><div class="qa-ic" style="background:${q.c}"><svg viewBox="0 0 24 24">${q.ic}</svg></div><div class="t">${q.t}</div><div class="d">${q.d}</div></button>`).join('')}</div></div>`;
      const recent=state.history.slice(0,6);
      const rd=`<div class="sec"><div class="sec-h"><h2>Recent Downloads</h2><span class="va" onclick="$('#uinput').focus()">＋</span></div>${recent.length?`<table class="tbl"><thead><tr><th>Name</th><th>Source</th><th>Format</th><th>Quality</th><th>Size</th><th>Status</th></tr></thead><tbody>${tableRows(recent)}</tbody></table>`:emptyState('Nothing here yet.','Paste a link above and Lumen will take care of the rest.')}</div>`;
      return qa+rd;
    }
    function quick(f){ state.selFormat=f; $('#uinput').focus(); if(state.analysis)renderResult(); toast('Mode: '+(FMT_LABELS[f]||f)); }
    function viewDownloads(){
      let items=state.history;
      if(state.filter==='subtitle'||state.filter==='document') return emptyState(`No ${state.filter}s yet.`,'Support for this type is coming. For now, paste video, audio, or gallery links.');
      if(state.filter)items=items.filter(e=>e.type===state.filter);
      if(!items.length)return emptyState('No downloads yet.','Your downloads will appear here as a visual library.');
      return `<div class="sec"><div class="grid">${items.map(tile).join('')}</div></div>`;
    }
    function viewHistory(){
      if(!state.history.length)return emptyState('No history yet.','Everything you download is logged here.');
      return `<div class="sec"><table class="tbl"><thead><tr><th>Name</th><th>Source</th><th>Format</th><th>Quality</th><th>Size</th><th>Status</th></tr></thead><tbody>${tableRows(state.history)}</tbody></table></div>`;
    }
    function viewQueues(){
      const items=Object.values(state.active);
      if(!items.length)return emptyState('Queue is empty.','Active and queued downloads show here in real time.');
      return `<div class="sec">${items.map(a=>`<div class="result-card" style="margin-bottom:10px"><div class="r-thumb" ${a.thumbnail?`style="background-image:url('${esc(a.thumbnail)}');background-size:cover"`:''}></div><div style="flex:1"><div class="r-title">${esc(a.title)}</div><div class="r-meta">${esc(a.source||'')} · ${FMT_LABELS[a.format]||a.format}</div><div class="q-bar ${a.progress<=0||a.format==='all'?'ind':''}" style="margin-top:10px"><i style="width:${a.progress||0}%"></i></div></div><span class="q-pct">${a.status==='error'?'Failed':(a.progress?Math.round(a.progress)+'%':'…')}</span></div>`).join('')}</div>`;
    }
    function viewSettings(){
      const dark=document.documentElement.dataset.theme==='dark';
      return `<div class="sec"><div class="sec-h"><h2>Appearance</h2></div><div class="panel"><div class="opt"><div><div class="opt-l">Dark mode</div><div class="opt-d">Glass, monochrome, easy on the eyes</div></div><div class="ctl"><div class="toggle ${dark?'on':''}" onclick="toggleTheme();this.classList.toggle('on')"></div></div></div></div></div>
        <div class="sec"><div class="sec-h"><h2>Downloads</h2></div><div class="panel"><div class="opt"><div><div class="opt-l">Auto-save to device</div><div class="opt-d">Files transfer to your browser when ready</div></div><div class="ctl"><div class="toggle on"></div></div></div></div></div>
        <div class="sec"><div class="sec-h"><h2>Storage</h2></div><div class="panel"><div class="opt"><div><div class="opt-l">Library size</div><div class="opt-d">${state.history.length} items downloaded</div></div><div class="ctl"><span style="color:var(--muted)">${fmtBytes(state.history.reduce((a,e)=>a+(e.size||0),0))}</span></div></div></div></div>
        <div class="sec"><div class="sec-h"><h2>Account · API</h2></div><div class="panel"><div class="opt"><div><div class="opt-l">Lumen API</div><div class="opt-d">Programmatic access — premium tier</div></div><div class="ctl"><span class="soon">SOON</span></div></div></div></div>`;
    }

    // ---- inspector ----
    function openInspector(id){
      const e=state.history.find(x=>x.id===id);if(!e)return;
      const opts=['<option value="">No collection</option>'].concat(state.collections.map(c=>`<option ${e.collection===c.name?'selected':''}>${esc(c.name)}</option>`)).join('');
      const prev=e.thumbnail?`<img class="iprev" src="${esc(e.thumbnail)}">`:`<div class="iprev">▣</div>`;
      const rows=[['Filename',esc(e.filename)],['Source',`<a href="${esc(e.url)}" target="_blank">${esc(e.source)}</a>`],['Type',kindLabel(e.type)],['Format',esc(e.format)],['Resolution',esc(e.resolution)||'—'],['Size',fmtBytes(e.size)||'—'],['Downloaded',new Date(e.date).toLocaleString()]];
      $('#inspector').innerHTML=`<div class="ih"><h3>File Details</h3><button class="iclose" onclick="closeInspector()">✕</button></div>${prev}<div class="ititle">${esc(e.title)}</div>
        ${rows.map(([k,v])=>`<div class="mr"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('')}
        <div class="iact"><a class="a-save" href="/api/file/${e.id}" download>Save again</a><button class="a-del" onclick="delItem('${e.id}')">Delete</button></div>
        <div class="mr" style="border:none"><div class="k" style="width:auto">Collection</div></div><select class="col-sel" onchange="assignCollection('${e.id}',this.value)">${opts}</select>
        <div class="ai"><div class="lbl">AI Actions <span class="soon">SOON</span></div><div class="ai-grid">
          <button class="ai-act">Summarize</button><button class="ai-act">Transcript</button><button class="ai-act">Convert to Notes</button><button class="ai-act">Translate</button><button class="ai-act">Highlights</button><button class="ai-act">Extract Audio</button>
        </div></div>`;
      $('#inspector').classList.add('open');
    }
    function closeInspector(){$('#inspector').classList.remove('open');}
    async function assignCollection(id,name){await api(`/api/history/${id}/collection`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({collection:name})});await loadData();toast(name?('Added to '+name):'Removed');}
    async function delItem(id){await api('/api/history/'+id,{method:'DELETE'});closeInspector();await loadData();render();toast('Deleted');}

    (function init(){
      const t=localStorage.getItem('lumen-theme');if(t)document.documentElement.dataset.theme=t;
      const pre=new URLSearchParams(location.search).get('url');
      loadData().then(()=>{render();if(pre){$('#uinput').value=pre;analyze();}});
    })();
  </script>
</body>
</html>
